<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
        }
        .btn {
            padding: 8px 12px;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            display: inline-block;
            text-align: center;
        }
        .btn-add {
            background-color: #28a745;
            margin-bottom: 10px;
        }
        .btn-edit {
            background-color: #007bff;
        }
        .btn-delete {
            background-color: #dc3545;
        }
        .btn:hover {
            opacity: 0.8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            text-align: center;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Course List</h2>

        <!-- Success Message -->
        <p th:if="${message}" style="color: green; text-align: center;">[[${message}]]</p>

        <a href="/courses/new" class="btn btn-add">➕ Add Course</a>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Author</th>
                <th>Actions</th>
            </tr>
            <tr th:each="course : ${courses}">
                <td th:text="${course.id}"></td>
                <td th:text="${course.name}"></td>
                <td th:text="${course.author}"></td>
                <td>
                    <a th:href="@{/courses/edit/{id}(id=${course.id})}" class="btn btn-edit">✏ Edit</a>
                    <a th:href="@{/courses/delete/{id}(id=${course.id})}" class="btn btn-delete" onclick="return confirm('Are you sure you want to delete this course?')">🗑 Delete</a>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
